name: vitamind
description: VitaMind — Intelligence for your life. AI-powered personal life management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.1

  # HTTP & networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Firebase (notifications)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # URL launcher (calendar OAuth redirect)
  url_launcher: ^6.3.1

  # Date
  intl: ^0.19.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Speech recognition
  speech_to_text: ^7.0.0

  sentry_flutter: ^8.3.0

  posthog_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
